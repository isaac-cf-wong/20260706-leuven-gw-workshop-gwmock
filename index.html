                <section

        <script src="node_modules/reveal.js/dist/reveal.js"></script>
        <script src="node_modules/reveal.js/dist/plugin/notes.js"></script>
        <script src="node_modules/reveal.js/dist/plugin/markdown.js"></script>
        <script src="node_modules/reveal.js/dist/plugin/highlight.js"></script>
        <script src="node_modules/reveal.js/dist/plugin/math.js"></script>
        <script src="node_modules/reveal.js/dist/plugin/search.js"></script>
        <script src="node_modules/reveal.js/dist/plugin/zoom.js"></script>
        <script src="js/custom.js"></script>

        <script>
            Reveal.initialize({
                controls: true,
                controlsTutorial: true,
                progress: true,
                slideNumber: 'c/t',
                hash: true,
                // ?print-pdf: one page per slide, not one per fragment
                pdfSeparateFragments: false,
                center: true,
                touch: true,
                width: 1280,
                height: 720,
                margin: 0.075,
                transition: 'fade',
                transitionSpeed: 'default',
                backgroundTransition: 'fade',
                viewDistance: 3,
                mobileViewDistance: 2,
                plugins: [
                    RevealMarkdown,
                    RevealHighlight,
                    RevealNotes,
                    RevealMath.KaTeX,
                    RevealSearch,
                    RevealZoom,
                ],
            }).then(() => {
                // ?print-pdf fix: re-typeset KaTeX after the PDF layout
                // completes, otherwise math on detached pages can stay raw.
                Reveal.on('pdf-ready', function rerenderMath() {
                    if (typeof renderMathInElement === 'function') {
                        renderMathInElement(Reveal.getSlidesElement(), {
                            delimiters: [
                                { left: '$$', right: '$$', display: true },
                                { left: '$', right: '$', display: false },
                                { left: '\\(', right: '\\)', display: false },
                                { left: '\\[', right: '\\]', display: true },
                            ],
                            ignoredTags: [
                                'script',
                                'noscript',
                                'style',
                                'textarea',
                                'pre',
                                'code',
                            ],
                        })
                        Reveal.layout()
                    } else {
                        setTimeout(rerenderMath, 100)
                    }
                })
            })
        </script>
    </body>
